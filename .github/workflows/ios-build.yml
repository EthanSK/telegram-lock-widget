name: iOS build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build app and widget without signing
        run: |
          xcodebuild \
            -project TelegramLockWidget.xcodeproj \
            -scheme TelegramLockWidget \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
